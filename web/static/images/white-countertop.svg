<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Subtle white laminate grain texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.03" intercept="0.94"/>
        <feFuncG type="linear" slope="0.03" intercept="0.94"/>
        <feFuncB type="linear" slope="0.03" intercept="0.94"/>
        <feFuncA type="linear" slope="1" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <!-- Slight edge shadow for depth -->
    <linearGradient id="edgeShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="0.03" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.97" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Post-formed rounded front edge profile -->
    <linearGradient id="frontEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e8e8"/>
      <stop offset="0.3" stop-color="#f5f5f5"/>
      <stop offset="0.7" stop-color="#ebebeb"/>
      <stop offset="1" stop-color="#d8d8d8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a1a"/>

  <!-- Countertop surface — perspective view -->
  <g transform="translate(20, 60)">
    <!-- Countertop top surface -->
    <rect x="0" y="0" width="360" height="260" rx="2" fill="#f0f0f0" filter="url(#grain)"/>
    <rect x="0" y="0" width="360" height="260" rx="2" fill="url(#edgeShadow)"/>

    <!-- Subtle surface veining (very faint grey) -->
    <line x1="45" y1="80" x2="180" y2="95" stroke="#e0e0e0" stroke-width="0.8" opacity="0.5"/>
    <line x1="120" y1="140" x2="300" y2="155" stroke="#ddd" stroke-width="0.6" opacity="0.4"/>
    <line x1="200" y1="50" x2="340" y2="60" stroke="#e2e2e2" stroke-width="0.7" opacity="0.3"/>

    <!-- Front edge (post-formed rounded) -->
    <rect x="0" y="260" width="360" height="28" rx="0" fill="url(#frontEdge)"/>
    <rect x="0" y="260" width="360" height="1" fill="#d0d0d0"/>
    <!-- Rounded bottom edge -->
    <ellipse cx="180" cy="288" rx="180" ry="4" fill="#c8c8c8" opacity="0.3"/>
  </g>

  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" fill="#666" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.5">
    WHITE LAMINATE — 8' POST-FORMED
  </text>
</svg>