<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 680" width="340" height="680">
  <defs>
    <linearGradient id="glass" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#d8dee6"/>
      <stop offset="30%" stop-color="#c8d0da"/>
      <stop offset="70%" stop-color="#bcc6d2"/>
      <stop offset="100%" stop-color="#d0d8e2"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="50%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f8f8"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
    <!-- Frosted glass texture -->
    <filter id="frost">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="2" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#e0e4ea" surfaceScale="0.8" result="light">
        <feDistantLight azimuth="135" elevation="50"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.5" k2="0.5" k3="0" k4="0"/>
    </filter>
    <!-- Subtle inner shadow for depth -->
    <filter id="inset">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur stdDeviation="2"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="340" height="680" fill="url(#bg)"/>

  <!-- ── Outer frame (thick black, like the real door) ── -->
  <rect x="70" y="30" width="200" height="620" rx="4" fill="url(#frame)"/>

  <!-- Inner door face -->
  <rect x="82" y="42" width="176" height="596" rx="2" fill="#1a1a1a"/>

  <!-- ── Glass panel 1 (top) ── -->
  <rect x="100" y="60" width="140" height="166" rx="2" fill="url(#glass)" filter="url(#frost)"/>
  <rect x="100" y="60" width="140" height="166" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Glass highlights -->
  <rect x="108" y="66" width="50" height="1.5" rx="0.75" fill="white" opacity="0.35"/>
  <line x1="102" y1="62" x2="238" y2="224" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!-- ── Divider bar 1 ── -->
  <rect x="88" y="232" width="164" height="16" rx="2" fill="#1e1e1e"/>
  <line x1="88" y1="240" x2="252" y2="240" stroke="#333" stroke-width="0.5" opacity="0.3"/>

  <!-- ── Glass panel 2 (middle) ── -->
  <rect x="100" y="254" width="140" height="166" rx="2" fill="url(#glass)" filter="url(#frost)"/>
  <rect x="100" y="254" width="140" height="166" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="108" y="260" width="40" height="1.5" rx="0.75" fill="white" opacity="0.3"/>
  <line x1="102" y1="256" x2="238" y2="418" stroke="white" stroke-width="0.5" opacity="0.05"/>

  <!-- ── Divider bar 2 ── -->
  <rect x="88" y="426" width="164" height="16" rx="2" fill="#1e1e1e"/>
  <line x1="88" y1="434" x2="252" y2="434" stroke="#333" stroke-width="0.5" opacity="0.3"/>

  <!-- ── Glass panel 3 (bottom) ── -->
  <rect x="100" y="448" width="140" height="166" rx="2" fill="url(#glass)" filter="url(#frost)"/>
  <rect x="100" y="448" width="140" height="166" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="108" y="454" width="35" height="1.5" rx="0.75" fill="white" opacity="0.25"/>

  <!-- ── Hardware: deadbolt + lever handle (right side) ── -->
  <!-- Deadbolt -->
  <circle cx="234" cy="320" r="6.5" fill="#3a3a3a" stroke="#444" stroke-width="0.8"/>
  <circle cx="234" cy="320" r="3" fill="#2a2a2a"/>
  <!-- Lever handle -->
  <circle cx="234" cy="355" r="7" fill="#3a3a3a" stroke="#444" stroke-width="0.8"/>
  <rect x="218" y="352" width="16" height="5" rx="2.5" fill="#3a3a3a" stroke="#444" stroke-width="0.5"/>

  <!-- Frame edge highlight (subtle 3D) -->
  <line x1="71" y1="32" x2="71" y2="648" stroke="#444" stroke-width="0.5" opacity="0.4"/>
  <line x1="269" y1="32" x2="269" y2="648" stroke="#111" stroke-width="0.5" opacity="0.3"/>
</svg>
