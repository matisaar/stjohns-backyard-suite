<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Model — St. John's Backyard Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --card: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #eee;
    --dim: #666;
    --muted: #999;
    --accent: #4da6ff;
    --green: #34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  .site-nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; height:52px;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .site-nav .brand { font-size:13px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
  .site-nav .brand b { color:var(--text); font-weight:700; }
  .site-nav .links { display:flex; gap:2px; }
  .site-nav .links a {
    padding:7px 16px; border-radius:8px; font-size:12px; font-weight:500;
    letter-spacing:0.03em; color:var(--dim); text-decoration:none; transition:all 0.15s;
  }
  .site-nav .links a:hover { color:var(--text); background:rgba(255,255,255,0.04); }
  .site-nav .links a.active { color:var(--accent); background:rgba(77,166,255,0.08); }
  .site-nav .meta { font-size:11px; color:var(--dim); letter-spacing:0.04em; }
  .site-nav .meta b { color:var(--green); font-weight:600; }

  main {
    margin-top:52px;
    display:grid;
    grid-template-columns:1fr 400px;
    height:calc(100vh - 52px);
  }

  .canvas-wrap {
    position:relative; overflow:hidden;
    background: radial-gradient(ellipse at 50% 60%, #1a1a2a 0%, #0a0a0a 70%);
  }
  #three-container { width:100%; height:100%; }

  /* Overlay UI */
  .view-controls {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; gap:1px; background:rgba(0,0,0,0.7);
    border-radius:10px; overflow:hidden;
    backdrop-filter:blur(12px); border:1px solid var(--border);
  }
  .view-btn {
    padding:9px 20px; font-size:11px; font-weight:500;
    color:var(--muted); background:transparent; border:none;
    cursor:pointer; transition:all 0.15s; letter-spacing:0.03em;
  }
  .view-btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
  .view-btn.active { color:var(--accent); background:rgba(77,166,255,0.12); }

  .hint-overlay {
    position:absolute; top:20px; left:20px;
    font-size:11px; color:var(--dim); letter-spacing:0.03em; line-height:1.8;
  }
  .hint-overlay kbd {
    display:inline-block; padding:2px 6px; border-radius:4px;
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    font-family:inherit; font-size:10px; color:var(--muted);
  }

  .hover-label {
    position:absolute; pointer-events:none;
    padding:8px 16px; border-radius:8px;
    background:rgba(0,0,0,0.85); border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    font-size:12px; font-weight:600; color:var(--text);
    white-space:nowrap; opacity:0; transition:opacity 0.12s;
    transform:translate(-50%, -120%);
  }
  .hover-label .sub { font-weight:400; color:var(--dim); font-size:10px; margin-top:2px; }
  .hover-label.visible { opacity:1; }

  /* Sidebar */
  .sidebar {
    background:var(--panel); border-left:1px solid var(--border);
    overflow-y:auto; display:flex; flex-direction:column;
  }
  .sb-header { padding:20px 24px; border-bottom:1px solid var(--border); }
  .sb-header h2 {
    font-size:11px; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--dim);
  }
  .sb-header p { font-size:13px; color:var(--muted); margin-top:4px; }

  .comp-list { padding:12px 24px; }
  .comp-item {
    display:flex; align-items:center; gap:10px;
    padding:9px 8px; cursor:pointer; transition:all 0.15s;
    border-radius:6px; margin-bottom:2px;
  }
  .comp-item:hover { background:rgba(255,255,255,0.03); }
  .comp-item.active { background:rgba(77,166,255,0.06); }
  .comp-item .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .comp-item .cname { font-size:12px; color:var(--muted); flex:1; }
  .comp-item.active .cname { color:var(--text); font-weight:600; }
  .comp-item .cprice { font-size:11px; color:var(--dim); font-weight:500; }

  #assemblyPanel { display:none; flex:1; overflow-y:auto; }
  #assemblyPanel.open { display:block; }
  .assembly-title {
    padding:20px 24px 12px;
    font-size:13px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--text);
    border-top:1px solid var(--border);
  }
  .cross-section { padding:0 24px 16px; }
  .cs-layer {
    display:flex; align-items:stretch; gap:12px;
    padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03);
    cursor:pointer; transition:background 0.15s; border-radius:6px;
  }
  .cs-layer:hover { background:rgba(255,255,255,0.02); }
  .cs-layer.active { background:rgba(77,166,255,0.05); }
  .cs-swatch { width:6px; border-radius:3px; flex-shrink:0; }
  .cs-info { flex:1; min-width:0; }
  .cs-info .name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cs-info .spec { font-size:11px; color:var(--dim); margin-top:2px; }
  .cs-price { font-size:12px; font-weight:600; color:var(--green); white-space:nowrap; align-self:center; }

  .layer-detail {
    margin:0 24px 16px; padding:16px;
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; display:none;
  }
  .layer-detail.open { display:block; }
  .layer-detail .ld-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .layer-detail .ld-cell { background:rgba(255,255,255,0.02); border-radius:6px; padding:8px 10px; }
  .layer-detail .ld-cell .label { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--dim); }
  .layer-detail .ld-cell .val { font-size:13px; font-weight:600; margin-top:2px; }
  .layer-detail .notes { font-size:11px; line-height:1.6; color:var(--dim); border-top:1px solid var(--border); padding-top:10px; }

  /* Section toggle */
  .section-toggle {
    position:absolute; top:20px; right:20px;
    display:flex; align-items:center; gap:10px;
    padding:8px 14px; border-radius:8px;
    background:rgba(0,0,0,0.7); border:1px solid var(--border);
    backdrop-filter:blur(12px); cursor:pointer;
    font-size:11px; color:var(--muted); user-select:none;
  }
  .section-toggle input { accent-color:var(--accent); }
  .section-toggle:hover { color:var(--text); border-color:rgba(255,255,255,0.15); }

  @media (max-width:900px) {
    main { grid-template-columns:1fr; grid-template-rows:55vh 1fr; }
    .sidebar { border-left:none; border-top:1px solid var(--border); }
    .site-nav .meta { display:none; }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="brand"><b>SJ</b> Backyard Suite</div>
  <div class="links">
    <a href="/">BOM</a>
    <a href="/model" class="active">3D Model</a>
    <a href="/render">Cross Sections</a>
    <a href="/finishes">Finishes</a>
  </div>
  <div class="meta">Grand Total <b>${{ "{:,.0f}".format(summary.grand_total) }}</b></div>
</nav>

<main>
  <div class="canvas-wrap">
    <div id="three-container"></div>
    <div class="hint-overlay">
      <kbd>Click</kbd> component to inspect &middot; <kbd>Drag</kbd> orbit &middot; <kbd>Scroll</kbd> zoom
    </div>
    <div id="hoverLabel" class="hover-label"></div>

    <label class="section-toggle">
      <input type="checkbox" id="sectionCut"> Section Cut
    </label>

    <div class="view-controls">
      <button class="view-btn active" data-view="iso">Isometric</button>
      <button class="view-btn" data-view="front">Front</button>
      <button class="view-btn" data-view="side">Side</button>
      <button class="view-btn" data-view="top">Top</button>
    </div>

    <div class="dims-label" style="position:absolute;bottom:60px;left:20px;font-size:10px;color:var(--dim);letter-spacing:0.05em;">
      21′-6″ × 20′-0″ &middot; 430 sq ft &middot; Mono-slope roof
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-header">
      <h2>Building Components</h2>
      <p>Click on the model or list to inspect assemblies</p>
    </div>
    <div class="comp-list" id="compList"></div>
    <div id="assemblyPanel">
      <div class="assembly-title" id="assemblyTitle"></div>
      <div class="cross-section" id="crossSection"></div>
      <div class="layer-detail" id="layerDetail"></div>
    </div>
  </div>
</main>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── Component data for sidebar ──
const COMPONENTS = {
  foundation: {
    name: 'Foundation & Slab', color: '#757575',
    ifcTypes: ['IfcSlab'],
    layers: [
      { name:'LVP Flooring', thick:'5.3 mm', color:'#3d2a16', qty:'22 BX', price:'$88.19/bx', total:'$1,940', notes:'Volcano Pewter SPC vinyl plank — waterproof click-lock over slab.' },
      { name:'Concrete Slab', thick:'4 in', color:'#757575', qty:'5.5 cu m', price:'$250/m³', total:'$1,375', notes:'25 MPa ready-mix with thickened perimeter edges.' },
      { name:'Wire Mesh', thick:'—', color:'#888', qty:'430 sqft', price:'$0.75/sqft', total:'$323', notes:'6×6 W2.9 welded wire mesh mid-slab for crack control.' },
      { name:'Vapour Barrier', thick:'10 mil', color:'#444', qty:'1 RL', price:'$112.50', total:'$113', notes:'Poly moisture barrier — seams lapped 12″ and taped.' },
      { name:'XPS Insulation', thick:'2 in', color:'#2d7dce', qty:'14 SH', price:'$50.39/sh', total:'$706', notes:'R-10 rigid foam beneath slab. Thermal break from ground.' },
      { name:'Gravel Base', thick:'4 in', color:'#666', qty:'16 cu yd', price:'$45/cu yd', total:'$720', notes:'¾″ clear crush, compacted in lifts.' },
    ]
  },
  walls: {
    name: 'Exterior Walls', color: '#8a9a8a',
    ifcTypes: ['IfcWall'],
    layers: [
      { name:'Vinyl Siding', thick:'—', color:'#8a9a8a', qty:'50 EA', price:'$11.19/ea', total:'$560', notes:'Mitten Oregon Pride Dutchlap.' },
      { name:'XPS Continuous', thick:'1.5 in', color:'#2d7dce', qty:'30 SH', price:'$113/sh', total:'$3,390', notes:'R-7.5 rigid foam continuous thermal envelope.' },
      { name:'Tyvek HomeWrap', thick:'—', color:'#ddd', qty:'2 RL', price:'$130/rl', total:'$260', notes:'Weather-resistant barrier.' },
      { name:'½″ Plywood', thick:'½ in', color:'#c4a67a', qty:'28 SH', price:'$39.98/sh', total:'$1,119', notes:'Structural sheathing.' },
      { name:'2×6 Studs + R-20 Batt', thick:'5.5 in', color:'#d4a862', qty:'52+8', price:'various', total:'$1,054', notes:'KD SPF @ 16″ o.c. with R-20 fiberglass batts.' },
      { name:'6-mil Poly VB', thick:'—', color:'#ccc', qty:'1 RL', price:'$90', total:'$90', notes:'Interior vapour retarder.' },
      { name:'½″ Drywall', thick:'½ in', color:'#e8e8e8', qty:'32 SH', price:'$17.82/sh', total:'$570', notes:'CGC UltraLight, painted Pure White.' },
    ]
  },
  roof: {
    name: 'Roof Assembly', color: '#333',
    ifcTypes: ['IfcRoof', 'IfcMember'],
    layers: [
      { name:'IKO Cambridge Shingles', thick:'—', color:'#333', qty:'15 BD', price:'$41/bd', total:'$615', notes:'Dual Black architectural laminate.' },
      { name:'Felt + Ice Shield', thick:'—', color:'#555', qty:'2 RL', price:'$65/rl', total:'$130', notes:'Organic felt + IKO StormShield at eaves.' },
      { name:'⅝″ Plywood Deck', thick:'⅝ in', color:'#c4a67a', qty:'16 SH', price:'$54.38/sh', total:'$870', notes:'Structural roof sheathing.' },
      { name:'2×12 Rafters + R-31', thick:'11.25 in', color:'#d4a862', qty:'13+13', price:'various', total:'$1,850', notes:'SPF #2 @ 24″ o.c. with R-31 batts + air chutes.' },
      { name:'⅝″ Type X Drywall', thick:'⅝ in', color:'#e8e8e8', qty:'16 SH', price:'$32/sh', total:'$512', notes:'CGC Firecode ceiling.' },
    ]
  },
  windows: {
    name: 'Windows', color: '#7abed4',
    ifcTypes: ['IfcWindow'],
    layers: [
      { name:'Triple-Pane Casement', thick:'—', color:'#7abed4', qty:'6 EA', price:'$479/ea', total:'$2,874', notes:'30×48″ vinyl casement — argon triple-glazed, U-0.25.' },
      { name:'Flashing Tape', thick:'—', color:'#888', qty:'2 RL', price:'$47/rl', total:'$95', notes:'Self-adhering window flashing.' },
    ]
  },
  door: {
    name: 'Entry Door', color: '#1a1a2a',
    ifcTypes: ['IfcDoor'],
    layers: [
      { name:'Dusco Moderna Full Lite', thick:'—', color:'#222', qty:'1 EA', price:'$850', total:'$850', notes:'34×80″ black steel frame, 3 frosted glass panels.' },
    ]
  },
  plumbing: {
    name: 'Plumbing', color: '#4488aa',
    ifcTypes: ['IfcPipeSegment', 'IfcFlowStorageDevice'],
    layers: [
      { name:'Water Heater (40 gal)', thick:'—', color:'#446a88', qty:'1 EA', price:'$595', total:'$595', notes:'Electric tank — kitchen + bath.' },
      { name:'PEX Supply (½″)', thick:'—', color:'#e44', qty:'2 RL', price:'$45/rl', total:'$90', notes:'Red/blue PEX home-run to manifold.' },
      { name:'ABS/PVC DWV', thick:'—', color:'#333', qty:'1 LOT', price:'$350', total:'$350', notes:'Drain/waste/vent rough-in.' },
      { name:'Fixtures', thick:'—', color:'#bbb', qty:'LOT', price:'various', total:'$3,217', notes:'Toilet, vanity, shower, kitchen sink, faucets.' },
    ]
  },
  electrical: {
    name: 'Electrical', color: '#bbaa44',
    ifcTypes: ['IfcDistributionControlElement'],
    layers: [
      { name:'100A Sub-Panel', thick:'—', color:'#988a44', qty:'1 EA', price:'$156', total:'$156', notes:'20-space, fed from main house.' },
      { name:'14/2 + 12/2 NMD90', thick:'—', color:'#ffa500', qty:'2 RL', price:'various', total:'$405', notes:'150m general + 75m kitchen/bath circuits.' },
      { name:'LED Pot Lights', thick:'—', color:'#ffdd00', qty:'1 PK', price:'$110', total:'$110', notes:'4″ slim recessed, IC-rated, black trim.' },
    ]
  },
  hvac: {
    name: 'HVAC / Mechanical', color: '#885555',
    ifcTypes: ['IfcUnitaryEquipment'],
    layers: [
      { name:'Mini-Split Heat Pump', thick:'—', color:'#7a5a5a', qty:'1 EA', price:'$1,553', total:'$1,553', notes:'18kBTU ductless — heating + cooling.' },
      { name:'HRV Ventilator', thick:'—', color:'#8a6a6a', qty:'1 EA', price:'$1,279', total:'$1,279', notes:'Heat-recovery fresh air exchange.' },
      { name:'Electric Baseboards', thick:'—', color:'#9a7a7a', qty:'2 EA', price:'$102/ea', total:'$204', notes:'1500W backup — bathrooms only.' },
    ]
  }
};

// Map IFC types to component keys
const IFC_TYPE_MAP = {};
Object.entries(COMPONENTS).forEach(([key, comp]) => {
  comp.ifcTypes.forEach(t => { IFC_TYPE_MAP[t] = key; });
});

// Also match pipe names to plumbing vs electrical
function classifyMesh(node) {
  const ifcType = node.userData?.ifc_type || '';
  const name = (node.name || '').toLowerCase();

  // Conduit pipes → electrical
  if (ifcType === 'IfcPipeSegment' && name.includes('conduit')) return 'electrical';
  // HRV/refrigerant ducts → hvac
  if (ifcType === 'IfcPipeSegment' && (name.includes('hrv') || name.includes('refrigerant'))) return 'hvac';

  return IFC_TYPE_MAP[ifcType] || null;
}

// ═══════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════
const container = document.getElementById('three-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d12);
scene.fog = new THREE.FogExp2(0x0d0d12, 0.025);

// Environment map for PBR reflections
const pmremGen = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGen.fromScene(new RoomEnvironment(renderer), 0.04).texture;

const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 200);
camera.position.set(14, 8, 14);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(3.2, 1.0, 3.0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3;
controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI * 0.48;
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0x404050, 0.5));
scene.add(new THREE.HemisphereLight(0x8899bb, 0x333322, 0.5));

const sun = new THREE.DirectionalLight(0xffeedd, 2.5);
sun.position.set(12, 18, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.left = -15; sun.shadow.camera.right = 15;
sun.shadow.camera.top = 15;   sun.shadow.camera.bottom = -15;
sun.shadow.camera.near = 1;   sun.shadow.camera.far = 50;
sun.shadow.bias = -0.0003;
sun.shadow.normalBias = 0.02;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x6688cc, 0.3).translateX(-8).translateY(4).translateZ(-6));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.95, envMapIntensity: 0.1 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(3, -0.01, 3);
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(80, 80, 0x1a1a22, 0x141418);
grid.position.set(3, 0, 3);
scene.add(grid);

// ═══════════════════════════════════════════════
//  LOAD GLB MODEL
// ═══════════════════════════════════════════════
const allMeshes = [];
const compMeshes = {};  // key → [meshes]
let selectedComp = null, hoveredComp = null;
const savedMats = new Map();

const loader = new GLTFLoader();
loader.load('/static/model.glb', (gltf) => {
  const model = gltf.scene;

  // Process each mesh — classify by IFC type, enable shadows, improve materials
  model.traverse((node) => {
    if (!node.isMesh) return;

    // Get IFC type from extras
    const ifcType = node.userData?.ifc_type;
    node.castShadow = true;
    node.receiveShadow = true;

    // Improve material — add envmap influence
    if (node.material) {
      node.material.envMapIntensity = 0.4;
      node.material.needsUpdate = true;
    }

    // Classify into component group
    const comp = classifyMesh(node);
    if (comp) {
      node.userData.component = comp;
      if (!compMeshes[comp]) compMeshes[comp] = [];
      compMeshes[comp].push(node);
      allMeshes.push(node);
    }
  });

  scene.add(model);
  console.log(`Loaded BIM model: ${allMeshes.length} interactive meshes across ${Object.keys(compMeshes).length} components`);

  // Auto-select foundation
  selectedComp = 'foundation';
  highlight('foundation');
  showAssembly('foundation');

}, (progress) => {
  // Loading progress
  if (progress.total) {
    const pct = Math.round(progress.loaded / progress.total * 100);
    document.querySelector('.sb-header p').textContent = `Loading model... ${pct}%`;
  }
}, (error) => {
  console.error('Failed to load GLB:', error);
  document.querySelector('.sb-header p').textContent = 'Failed to load 3D model';
});

// ═══════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const hoverLabel = document.getElementById('hoverLabel');

function highlight(comp) {
  savedMats.forEach((mat, m) => { m.material = mat; });
  savedMats.clear();
  if (!comp) return;
  (compMeshes[comp] || []).forEach(m => {
    if (m.material && m.material.emissive) {
      savedMats.set(m, m.material);
      const c = m.material.clone();
      c.emissive = new THREE.Color(0x224466);
      c.emissiveIntensity = 0.6;
      m.material = c;
    }
  });
}

renderer.domElement.addEventListener('mousemove', e => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  const comp = hits.length ? hits[0].object.userData.component : null;
  if (comp !== hoveredComp) {
    hoveredComp = comp;
    if (!selectedComp) highlight(comp);
    highlightList(comp || selectedComp);
  }
  if (comp && COMPONENTS[comp]) {
    hoverLabel.innerHTML = `<div>${COMPONENTS[comp].name}</div><div class="sub">Click to inspect</div>`;
    hoverLabel.style.left = e.clientX + 'px'; hoverLabel.style.top = e.clientY + 'px';
    hoverLabel.classList.add('visible');
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoverLabel.classList.remove('visible');
    renderer.domElement.style.cursor = 'grab';
  }
});

renderer.domElement.addEventListener('click', () => {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes);
  const comp = hits.length ? hits[0].object.userData.component : null;
  if (comp) { selectedComp = comp; highlight(comp); showAssembly(comp); }
});

renderer.domElement.addEventListener('mouseleave', () => {
  hoveredComp = null; hoverLabel.classList.remove('visible');
  if (!selectedComp) highlight(null);
});

// Section cut — hide back/right walls, show MEP
document.getElementById('sectionCut').addEventListener('change', function() {
  const cut = this.checked;
  allMeshes.forEach(m => {
    const name = (m.name || '').toLowerCase();
    // Hide back and right walls in section cut
    if (m.userData.component === 'walls') {
      if (name.includes('back') || name.includes('right') || name.includes('east') || name.includes('north')) {
        m.visible = !cut;
      }
    }
  });
});

// Camera presets
const viewBtns = document.querySelectorAll('.view-btn');
viewBtns.forEach(btn => btn.addEventListener('click', () => {
  viewBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let pos;
  switch (btn.dataset.view) {
    case 'iso':   pos = { x: 14, y: 8, z: 14 }; break;
    case 'front': pos = { x: 3.2, y: 1.8, z: -8 }; break;
    case 'side':  pos = { x: -8, y: 2, z: 3 }; break;
    case 'top':   pos = { x: 3.2, y: 16, z: 3.01 }; break;
  }
  const from = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const t0 = performance.now(), dur = 700;
  (function step(now) {
    const p = Math.min((now - t0) / dur, 1), e = 1 - Math.pow(1 - p, 3);
    camera.position.set(from.x + (pos.x - from.x)*e, from.y + (pos.y - from.y)*e, from.z + (pos.z - from.z)*e);
    controls.update();
    if (p < 1) requestAnimationFrame(step);
  })(performance.now());
}));

// ═══════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════
const compList = document.getElementById('compList');
const assemblyPanel = document.getElementById('assemblyPanel');
const assemblyTitle = document.getElementById('assemblyTitle');
const crossSection = document.getElementById('crossSection');
const layerDetailEl = document.getElementById('layerDetail');

Object.entries(COMPONENTS).forEach(([key, comp]) => {
  const total = comp.layers.reduce((s, l) => s + (parseInt(l.total.replace(/[$,]/g, '')) || 0), 0);
  const el = document.createElement('div');
  el.className = 'comp-item'; el.dataset.comp = key;
  el.innerHTML = `<div class="dot" style="background:${comp.color}"></div>
    <span class="cname">${comp.name}</span>
    <span class="cprice">$${total.toLocaleString()}</span>`;
  el.addEventListener('click', () => { selectedComp = key; highlight(key); showAssembly(key); });
  el.addEventListener('mouseenter', () => { if (!selectedComp) highlight(key); });
  el.addEventListener('mouseleave', () => { if (!selectedComp) highlight(null); });
  compList.appendChild(el);
});

function highlightList(comp) {
  compList.querySelectorAll('.comp-item').forEach(el => el.classList.toggle('active', el.dataset.comp === comp));
}

function showAssembly(key) {
  const comp = COMPONENTS[key]; if (!comp) return;
  highlightList(key);
  assemblyPanel.classList.add('open');
  assemblyTitle.textContent = comp.name + ' — Assembly Layers';
  crossSection.innerHTML = comp.layers.map((l, i) => `
    <div class="cs-layer" data-idx="${i}" onclick="showLayerDetail('${key}',${i})">
      <div class="cs-swatch" style="background:${l.color}"></div>
      <div class="cs-info"><div class="name">${l.name}</div>
        <div class="spec">${l.thick !== '—' ? l.thick + ' thick · ' : ''}${l.qty}</div></div>
      <div class="cs-price">${l.total}</div>
    </div>`).join('');
  layerDetailEl.classList.remove('open');
}

window.showLayerDetail = function(key, idx) {
  const l = COMPONENTS[key]?.layers[idx]; if (!l) return;
  crossSection.querySelectorAll('.cs-layer').forEach((el, i) => el.classList.toggle('active', i === idx));
  layerDetailEl.innerHTML = `
    <div class="ld-grid">
      <div class="ld-cell"><div class="label">Quantity</div><div class="val">${l.qty}</div></div>
      <div class="ld-cell"><div class="label">Unit Price</div><div class="val">${l.price}</div></div>
      <div class="ld-cell"><div class="label">Extended</div><div class="val" style="color:var(--green)">${l.total}</div></div>
      <div class="ld-cell"><div class="label">Thickness</div><div class="val">${l.thick}</div></div>
    </div>
    <div class="notes">${l.notes}</div>`;
  layerDetailEl.classList.add('open');
};

// ═══════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
