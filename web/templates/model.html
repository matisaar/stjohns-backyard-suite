<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Model — St. John's Backyard Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111;
    --card: #161616;
    --border: rgba(255,255,255,0.07);
    --text: #eee;
    --dim: #666;
    --muted: #999;
    --accent: #4da6ff;
    --green: #34d399;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ── Shared Nav (injected by nav partial) ── */
  .site-nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; height:52px;
    background:rgba(10,10,10,0.85);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
  }
  .site-nav .brand {
    font-size:13px; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--muted);
  }
  .site-nav .brand b { color:var(--text); font-weight:700; }
  .site-nav .links { display:flex; gap:2px; }
  .site-nav .links a {
    padding:7px 16px; border-radius:8px;
    font-size:12px; font-weight:500; letter-spacing:0.03em;
    color:var(--dim); text-decoration:none; transition:all 0.15s;
  }
  .site-nav .links a:hover { color:var(--text); background:rgba(255,255,255,0.04); }
  .site-nav .links a.active {
    color:var(--accent); background:rgba(77,166,255,0.08);
  }
  .site-nav .meta {
    font-size:11px; color:var(--dim); letter-spacing:0.04em;
  }
  .site-nav .meta b { color:var(--green); font-weight:600; }

  /* ── Main Area ── */
  main {
    margin-top:52px;
    display:grid;
    grid-template-columns:1fr 380px;
    height:calc(100vh - 52px);
  }

  /* ── Canvas ── */
  .canvas-wrap {
    position:relative; overflow:hidden;
    background:radial-gradient(ellipse at 50% 40%, #111 0%, #0a0a0a 70%);
  }
  #scene {
    width:100%; height:100%; display:block; cursor:grab;
  }
  #scene:active { cursor:grabbing; }

  /* Overlay controls */
  .view-controls {
    position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
    display:flex; gap:1px; background:rgba(0,0,0,0.6);
    border-radius:10px; overflow:hidden;
    backdrop-filter:blur(12px); border:1px solid var(--border);
  }
  .view-btn {
    padding:8px 18px; font-size:11px; font-weight:500;
    color:var(--muted); background:transparent; border:none;
    cursor:pointer; transition:all 0.15s; letter-spacing:0.03em;
  }
  .view-btn:hover { color:var(--text); background:rgba(255,255,255,0.05); }
  .view-btn.active { color:var(--accent); background:rgba(77,166,255,0.1); }

  .hint-overlay {
    position:absolute; top:20px; left:20px;
    font-size:11px; color:var(--dim); letter-spacing:0.03em;
  }
  .hint-overlay span { color:var(--muted); }

  /* Component label on hover */
  .hover-label {
    position:absolute; pointer-events:none;
    padding:6px 14px; border-radius:8px;
    background:rgba(0,0,0,0.8); border:1px solid var(--border);
    backdrop-filter:blur(8px);
    font-size:12px; font-weight:500; color:var(--text);
    white-space:nowrap; opacity:0; transition:opacity 0.15s;
    transform:translate(-50%, -100%); margin-top:-12px;
  }
  .hover-label.visible { opacity:1; }

  /* ── Detail Sidebar ── */
  .sidebar {
    background:var(--panel); border-left:1px solid var(--border);
    overflow-y:auto; padding:0;
  }
  .sb-header {
    padding:20px 24px; border-bottom:1px solid var(--border);
  }
  .sb-header h2 {
    font-size:11px; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--dim);
  }
  .sb-header p {
    font-size:13px; color:var(--muted); margin-top:4px;
  }

  /* Assembly card */
  .assembly-title {
    padding:20px 24px 12px;
    font-size:13px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--text);
  }

  .cross-section {
    padding:0 24px 16px;
  }
  .cs-layer {
    display:flex; align-items:stretch; gap:12px;
    padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03);
    cursor:pointer; transition:background 0.15s;
    border-radius:6px;
  }
  .cs-layer:hover { background:rgba(255,255,255,0.02); }
  .cs-layer.active { background:rgba(77,166,255,0.05); }

  .cs-swatch {
    width:6px; border-radius:3px; flex-shrink:0;
  }
  .cs-info { flex:1; min-width:0; }
  .cs-info .name {
    font-size:12px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cs-info .spec {

  }
  .cs-price {

  }

  }

    display:flex; align-items:center; gap:10px;

  .comp-item .dot {

  .comp-item .cname {
    font-size:12px; color:var(--muted); flex:1;
  }
  .comp-item.active .cname { color:var(--text); font-weight:600; }

  /* ── Responsive ── */
  @media (max-width:900px) {
    main { grid-template-columns:1fr; grid-template-rows:50vh 1fr; }
    .sidebar { border-left:none; border-top:1px solid var(--border); }
    .site-nav .meta { display:none; }
  }
</style>

<script>
// ═══════════════════════════════════════════════════════════════════

const ctx = canvas.getContext('2d');

// Camera state
let camAngle = 0.6;        // horizontal rotation (radians)
let camPitch = 0.45;       // vertical tilt
let camDist = 42;
let camTarget = { x: B.w/2, y: B.h/2, z: B.d/2 };
let isDragging = false;

// ═══════════════════════════════════════════════════════════════════
//  3D PROJECTION ENGINE
// ═══════════════════════════════════════════════════════════════════

function project(x, y, z) {
  // Rotate around Y axis (horizontal orbit)
  const cosA = Math.cos(camAngle), sinA = Math.sin(camAngle);
  let rx = (x - camTarget.x) * cosA - (z - camTarget.z) * sinA;
  let rz = (x - camTarget.x) * sinA + (z - camTarget.z) * cosA;
  let ry = y - camTarget.y;

  // Pitch (vertical tilt)
  const cosP = Math.cos(camPitch), sinP = Math.sin(camPitch);
  let py = ry * cosP - rz * sinP;
  let pz = ry * sinP + rz * cosP;

  // Perspective — use CSS pixel dimensions, not device pixels
  const scale = camDist / (camDist + pz);
  const cx = canvas.clientWidth / 2;
  const cy = canvas.clientHeight / 2;

  return {
    x: cx + rx * scale * 14,
    y: cy - py * scale * 14,
    z: pz,
    scale
  };
}

// ═══════════════════════════════════════════════════════════════════
//  BUILDING GEOMETRY — faces with component tagging
// ═══════════════════════════════════════════════════════════════════

function getBuildingFaces() {
  const faces = [];
  const w = B.w, d = B.d, h = B.h;
  const rh = B.roofPitch; // extra height at high side

  // Cut plane for section view
  const cutZ = sectionCut ? d * 0.5 : d;

  // ── Foundation slab ──
  faces.push({
    comp: 'foundation',
    verts: [[0,0,0],[w,0,0],[w,0,cutZ],[0,0,cutZ]],
    baseColor: COMPONENTS.foundation.color,
    normal: [0,-1,0]
  });

  // ── Floor (visible top of slab) ──
  faces.push({
    comp: 'foundation',
    verts: [[0,0.3,0],[w,0.3,0],[w,0.3,cutZ],[0,0.3,cutZ]],
    baseColor: '#3d2a16',
    normal: [0,1,0]
  });

  // ── Walls ──
  // Front wall (z=0)
  faces.push({
    comp: 'walls',
    verts: [[0,0.3,0],[w,0.3,0],[w,h,0],[0,h+rh,0]],
    baseColor: COMPONENTS.walls.color,
    normal: [0,0,-1]
  });

  // Back wall (z=cutZ)
  if (!sectionCut) {
    faces.push({
      comp: 'walls',
      verts: [[0,0.3,d],[w,0.3,d],[w,h,d],[0,h+rh,d]],
      baseColor: COMPONENTS.walls.color,
      normal: [0,0,1]
    });
  }

  // Left wall (x=0)
  faces.push({
    comp: 'walls',
    verts: [[0,0.3,0],[0,0.3,cutZ],[0,h+rh,cutZ],[0,h+rh,0]],
    baseColor: adjustColor(COMPONENTS.walls.color, -15),
    normal: [-1,0,0]
  });

  // Right wall (x=w)
  faces.push({
    comp: 'walls',
    verts: [[w,0.3,0],[w,0.3,cutZ],[w,h,cutZ],[w,h,0]],
    baseColor: adjustColor(COMPONENTS.walls.color, 10),
    normal: [1,0,0]
  });

  // ── Roof ──
  // Mono-slope: high side at x=0 (h+rh), low side at x=w (h)
  faces.push({
    comp: 'roof',
    verts: [[-0.5,h+rh,-0.8],[w+0.5,h,-0.8],[w+0.5,h,cutZ+(sectionCut?0:0.8)],[-0.5,h+rh,cutZ+(sectionCut?0:0.8)]],
    baseColor: COMPONENTS.roof.color,
    normal: [0,1,0.15]
  });

  // Roof underside (soffit visible area)
  // Skip for section cut to show interior

  // ── Windows (on front wall) ──
  // 3 windows on front
  for (let i = 0; i < 3; i++) {
    const wx = 3 + i * 6.5;
    const wy = 3;
    const ww = 2.5;
    const wh = 4;
    faces.push({
      comp: 'windows',
      verts: [[wx,wy,-0.01],[wx+ww,wy,-0.01],[wx+ww,wy+wh,-0.01],[wx,wy+wh,-0.01]],
      baseColor: '#5aaed0',
      normal: [0,0,-1]
    });
  }

  // 2 windows on right wall
  for (let i = 0; i < 2; i++) {
    const wz = 4 + i * 8;
    if (wz + 2.5 > cutZ) continue;
    faces.push({
      comp: 'windows',
      verts: [[w+0.01,3,wz],[w+0.01,3,wz+2.5],[w+0.01,7,wz+2.5],[w+0.01,7,wz]],
      baseColor: '#5aaed0',
      normal: [1,0,0]
    });
  }

  // ── Door (front wall) ──
  faces.push({
    comp: 'door',
    verts: [[9.5,0.3,-0.01],[12.5,0.3,-0.01],[12.5,7,-0.01],[9.5,7,-0.01]],
    baseColor: '#1a1a2a',
    normal: [0,0,-1]
  });

  // ── Section cut — interior cross-section fill ──
  if (sectionCut) {
    // Wall cross-section (left wall interior)
    // Show layered colors on the cut face
    const layers = COMPONENTS.walls.layers;
    const cutFaceZ = cutZ;

    // Simplified wall cut — show colored stripe
    faces.push({
      comp: 'walls',
      verts: [[0,0.3,cutFaceZ],[w,0.3,cutFaceZ],[w,h,cutFaceZ],[0,h+rh,cutFaceZ]],
      baseColor: '#3a4a3a',
      normal: [0,0,1]
    });

    // Roof section cut
    faces.push({
      comp: 'roof',
      verts: [[-0.5,h+rh,cutFaceZ],[w+0.5,h,cutFaceZ],[w+0.5,h-1,cutFaceZ],[-0.5,h+rh-1,cutFaceZ]],
      baseColor: '#3a3a5a',
      normal: [0,0,1]
    });

    // Foundation section
    faces.push({
      comp: 'foundation',
      verts: [[0,-0.5,cutFaceZ],[w,-0.5,cutFaceZ],[w,0.3,cutFaceZ],[0,0.3,cutFaceZ]],
      baseColor: '#555',
      normal: [0,0,1]
    });

    // Mechanical indicator (inside)
    faces.push({
      comp: 'mechanical',
      verts: [[1,1,cutFaceZ-0.01],[3.5,1,cutFaceZ-0.01],[3.5,3.5,cutFaceZ-0.01],[1,3.5,cutFaceZ-0.01]],
      baseColor: COMPONENTS.mechanical.color,
      normal: [0,0,1]
    });

    // Electrical panel
    faces.push({
      comp: 'electrical',
      verts: [[w-3,2,cutFaceZ-0.01],[w-1.5,2,cutFaceZ-0.01],[w-1.5,5,cutFaceZ-0.01],[w-3,5,cutFaceZ-0.01]],
      baseColor: COMPONENTS.electrical.color,
      normal: [0,0,1]
    });

    // Plumbing stub
    faces.push({
      comp: 'plumbing',
      verts: [[8,0,cutFaceZ-0.01],[10,0,cutFaceZ-0.01],[10,2,cutFaceZ-0.01],[8,2,cutFaceZ-0.01]],
      baseColor: COMPONENTS.plumbing.color,
      normal: [0,0,1]
    });
  }

  return faces;
}

function adjustColor(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  let r = Math.min(255, Math.max(0, (num >> 16) + amount));
  let g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + amount));
  let b = Math.min(255, Math.max(0, (num & 0xff) + amount));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════════════

let hoveredComp = null;
let selectedComp = null;

function render() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

  const faces = getBuildingFaces();

  // Project all faces and sort by depth (painter's algorithm)
  const projected = faces.map(face => {
    const pts = face.verts.map(v => project(v[0], v[1], v[2]));
    const avgZ = pts.reduce((s, p) => s + p.z, 0) / pts.length;
    return { ...face, pts, avgZ };
  });
  projected.sort((a, b) => b.avgZ - a.avgZ);

  // Draw
  for (const face of projected) {
    ctx.beginPath();
    ctx.moveTo(face.pts[0].x, face.pts[0].y);
    for (let i = 1; i < face.pts.length; i++) {
      ctx.lineTo(face.pts[i].x, face.pts[i].y);
    }
    ctx.closePath();

    // Color based on hover/select state
    let color = face.baseColor;
    if (face.comp === hoveredComp || face.comp === selectedComp) {
      color = COMPONENTS[face.comp]?.highlight || color;
      ctx.shadowColor = 'rgba(77,166,255,0.3)';
      ctx.shadowBlur = 15;
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = color;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Store projected faces for hit testing
  window._projectedFaces = projected;
}

// ═══════════════════════════════════════════════════════════════════
//  HIT TESTING
// ═══════════════════════════════════════════════════════════════════

function pointInPolygon(x, y, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    if ((yi > y) !== (yj > y) && x < ((xj - xi) * (y - yi)) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function hitTest(mx, my) {
  const faces = window._projectedFaces || [];
  // Test front-to-back (reverse of draw order)
  for (let i = faces.length - 1; i >= 0; i--) {
    if (pointInPolygon(mx, my, faces[i].pts)) {
      return faces[i].comp;
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════════════

const hoverLabel = document.getElementById('hoverLabel');

canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    camAngle -= dx * 0.005;
    camPitch = Math.max(-0.8, Math.min(1.2, camPitch - dy * 0.005));
    lastMouse = { x: e.clientX, y: e.clientY };
    render();
    return;
  }

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const comp = hitTest(mx, my);

  if (comp !== hoveredComp) {
    hoveredComp = comp;
    render();
    highlightCompInList(comp);
  }

  if (comp && COMPONENTS[comp]) {
    hoverLabel.textContent = COMPONENTS[comp].name;
    hoverLabel.style.left = e.clientX + 'px';
    hoverLabel.style.top = e.clientY + 'px';
    hoverLabel.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    hoverLabel.classList.remove('visible');
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', (e) => {
  const wasDrag = Math.abs(e.clientX - lastMouse.x) > 3 || Math.abs(e.clientY - lastMouse.y) > 3;
  isDragging = false;

  if (!wasDrag) {
    const rect = canvas.getBoundingClientRect();
    const comp = hitTest(e.clientX - rect.left, e.clientY - rect.top);
    if (comp) {
      selectedComp = comp;
      showAssembly(comp);
      render();
    }
  }
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  hoveredComp = null;
  hoverLabel.classList.remove('visible');
  render();
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDist = Math.max(20, Math.min(80, camDist + e.deltaY * 0.03));
  render();
}, { passive: false });

// ── Camera presets ──
function setCameraAngle(preset, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  sectionCut = false;
  switch(preset) {
    case 'iso':    camAngle = 0.6;  camPitch = 0.45; camDist = 42; break;
    case 'front':  camAngle = 0;    camPitch = 0.15; camDist = 38; break;
    case 'side':   camAngle = Math.PI/2; camPitch = 0.15; camDist = 38; break;
    case 'top':    camAngle = 0.3;  camPitch = 1.1;  camDist = 45; break;
    case 'section':
      camAngle = 0.5; camPitch = 0.35; camDist = 38;
      sectionCut = true;
      break;
  }
  render();
}

// ═══════════════════════════════════════════════════════════════════
//  SIDEBAR — Component list + Assembly detail
// ═══════════════════════════════════════════════════════════════════

const compList = document.getElementById('compList');
const assemblyPanel = document.getElementById('assemblyPanel');
const assemblyTitle = document.getElementById('assemblyTitle');
const crossSection = document.getElementById('crossSection');
const layerDetailEl = document.getElementById('layerDetail');

// Build component list
Object.entries(COMPONENTS).forEach(([key, comp]) => {
  const el = document.createElement('div');
  el.className = 'comp-item';
  el.dataset.comp = key;
  el.innerHTML = `<div class="dot" style="background:${comp.color}"></div><span class="cname">${comp.name}</span>`;
  el.addEventListener('click', () => {
    selectedComp = key;
    showAssembly(key);
    render();
  });
  el.addEventListener('mouseenter', () => {
    hoveredComp = key;
    render();
  });
  el.addEventListener('mouseleave', () => {
    hoveredComp = null;
    render();
  });
  compList.appendChild(el);
});

function highlightCompInList(comp) {
  compList.querySelectorAll('.comp-item').forEach(el => {
    el.classList.toggle('active', el.dataset.comp === comp);
  });
}

function showAssembly(compKey) {
  const comp = COMPONENTS[compKey];
  if (!comp) return;

  highlightCompInList(compKey);
  assemblyPanel.style.display = 'block';
  assemblyTitle.textContent = comp.name + ' Assembly';

  crossSection.innerHTML = comp.layers.map((layer, i) => `
    <div class="cs-layer" data-idx="${i}" onclick="showLayerDetail('${compKey}', ${i})">
      <div class="cs-swatch" style="background:${layer.color}"></div>
      <div class="cs-info">
        <div class="name">${layer.name}</div>
        <div class="spec">${layer.thick}${layer.thick !== '—' ? ' thick' : ''} · ${layer.qty}</div>
      </div>
      <div class="cs-price">${layer.total}</div>
    </div>
  `).join('');

  layerDetailEl.classList.remove('open');
  layerDetailEl.innerHTML = '';
}

function showLayerDetail(compKey, idx) {
  const layer = COMPONENTS[compKey].layers[idx];
  if (!layer) return;

  crossSection.querySelectorAll('.cs-layer').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  layerDetailEl.innerHTML = `
    <div class="ld-grid">
      <div class="ld-cell"><div class="label">Quantity</div><div class="val">${layer.qty}</div></div>
      <div class="ld-cell"><div class="label">Unit Price</div><div class="val">${layer.price}</div></div>
      <div class="ld-cell"><div class="label">Extended</div><div class="val" style="color:var(--green)">${layer.total}</div></div>
      <div class="ld-cell"><div class="label">Thickness</div><div class="val">${layer.thick}</div></div>
    </div>
    <div class="notes">${layer.notes}</div>
  `;
  layerDetailEl.classList.add('open');
}

// ── Resize & Initial render ──
window.addEventListener('resize', render);
render();

// Show foundation by default
selectedComp = 'foundation';
showAssembly('foundation');
</script>
</body>
</html>
